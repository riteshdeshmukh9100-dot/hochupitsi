<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOCHUPITSI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #070a12;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation; 
        }

        /* 🎥 Reusable Double Buffer Video Channels */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s linear; 
        }

        .bg-video.visible {
            opacity: 1;
        }

        /* 🎛️ User Interface Wrapper */
        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .ui-container.cinematic-mode {
            opacity: 0;
            pointer-events: none; 
            transform: translateY(15px);
        }

        /* 🏷️ Header Style */
        .header-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 30px;
            border-radius: 15px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            user-select: none;
        }

        /* 🔍 Search Input Box Style */
        .search-box {
            width: 100%;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            -webkit-appearance: none; 
        }

        .search-box:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(10, 15, 30, 0.75);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.03);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
        }

        /* 🛑 Modern Minimalist Stop Button Style */
        .stop-btn {
            background: rgba(255, 99, 99, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 99, 99, 0.2);
            padding: 10px 24px;
            border-radius: 30px;
            color: #ff8585;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateY(5px);
        }

        .stop-btn.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .stop-btn:hover {
            background: rgba(255, 99, 99, 0.2);
            border-color: rgba(255, 99, 99, 0.4);
            color: #fff;
            box-shadow: 0 10px 25px rgba(255, 99, 99, 0.15);
        }
    </style>
</head>
<body>

    <video id="videoChannelA" class="bg-video" playsinline crossorigin="anonymous"></video>
    <video id="videoChannelB" class="bg-video" playsinline crossorigin="anonymous"></video>

    <div id="uiContainer" class="ui-container">
        <div class="header-box">FOR HOCHUPITSI</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Type anything you want to see..." autofocus>
        
        <button id="stopButton" class="stop-btn">Stop Vibe</button>
    </div>

    <script>
        const PEXELS_API_KEY = "Y284hGioTJ3wn6n1dHtkYKy05rryaRtxu2x0zeACAGRJJcWQi1G2CZvd"; 

        const uiContainer = document.getElementById('uiContainer');
        const searchInput = document.getElementById('searchInput');
        const stopButton = document.getElementById('stopButton');
        const videoA = document.getElementById('videoChannelA');
        const videoB = document.getElementById('videoChannelB');

        const localDatabase = {
            'rain': 'rain_video1090.mp4',
            'train': '356116.mp4',
            'space': 'interstellar.mp4'
        };

        let activeChannel = videoA;
        let bufferChannel = videoB;
        
        let isVideoActive = false;
        let uiFadeTimeout;
        let crossfadeTriggered = false;

        // --- 🔁 Perfect Endless Seamless Loop System ---
        function handleTimeUpdate(e) {
            const vid = e.target;
            if (vid !== activeChannel || !vid.duration) return;

            if (vid.currentTime > vid.duration - 0.6 && !crossfadeTriggered) {
                crossfadeTriggered = true;
                
                bufferChannel.currentTime = 0;
                bufferChannel.muted = false;
                
                bufferChannel.play().then(() => {
                    activeChannel.classList.remove('visible');
                    bufferChannel.classList.add('visible');

                    let temp = activeChannel;
                    activeChannel = bufferChannel;
                    bufferChannel = temp;

                    bufferChannel.pause();
                    crossfadeTriggered = false;
                }).catch(() => {
                    crossfadeTriggered = false;
                });
            }
        }

        videoA.addEventListener('timeupdate', handleTimeUpdate);
        videoB.addEventListener('timeupdate', handleTimeUpdate);

        // --- 🤖 Dynamic AI API Request Engine ---
        async function fetchDynamicVideo(query) {
            if (!PEXELS_API_KEY) {
                alert("Setup Required: Please insert your free Pexels API Key.");
                return;
            }

            try {
                const response = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=landscape&per_page=3`, {
                    headers: { 'Authorization': PEXELS_API_KEY }
                });

                const data = await response.json();

                if (!data.videos || data.videos.length === 0) {
                    alert(`Vibe check failed: Could not find any videos matching "${query}". Try another description!`);
                    return;
                }

                const videoData = data.videos[0];
                const matchingFile = videoData.video_files.find(f => f.file_type === 'video/mp4' && f.quality === 'hd') || videoData.video_files[0];

                if (matchingFile && matchingFile.link) {
                    runEnvironment(matchingFile.link);
                } else {
                    alert("Could not extract a valid stream format file for this query.");
                }

            } catch (error) {
                console.error("API Connection Error:", error);
                alert("Network error connection failed while reaching stock servers.");
            }
        }

        // Core stream loading router
        function runEnvironment(videoStreamUrl) {
            crossfadeTriggered = false;

            videoA.pause();
            videoB.pause();
            videoA.classList.remove('visible');
            videoB.classList.remove('visible');

            videoA.src = videoStreamUrl;
            videoB.src = videoStreamUrl;
            videoA.load();
            videoB.load();

            activeChannel = videoA;
            bufferChannel = videoB;

            activeChannel.classList.add('visible');
            activeChannel.muted = false;

            activeChannel.play().then(() => {
                isVideoActive = true;
                stopButton.classList.add('active'); // Reveal stop button
                startUIFadeTimer();
            }).catch(err => {
                activeChannel.muted = true;
                activeChannel.play().then(() => {
                    isVideoActive = true;
                    stopButton.classList.add('active');
                    startUIFadeTimer();
                });
            });
        }

        // 🛑 MASTER SHUTDOWN CONTROLLER
        function stopEnvironment() {
            isVideoActive = false;
            clearTimeout(uiFadeTimeout);
            
            // Kill playback systems immediately
            videoA.pause();
            videoB.pause();
            videoA.classList.remove('visible');
            videoB.classList.remove('visible');
            
            // Completely scrub video sources to force stop data streaming background tasks
            videoA.src = "";
            videoB.src = "";
            
            // Restore pristine layout views
            uiContainer.classList.remove('cinematic-mode');
            stopButton.classList.remove('active'); // Hide stop button
            searchInput.value = '';
            searchInput.focus(); // Pull touch keyboard frame focus back up automatically
        }

        // Hook up click listener to the physical stop button
        stopButton.addEventListener('click', (e) => {
            e.stopPropagation(); // Stops touch click events from triggering wake loops instantly
            stopEnvironment();
        });

        // Interface visibility manager
        function startUIFadeTimer() {
            if (!isVideoActive) return; 
            uiContainer.classList.remove('cinematic-mode');
            clearTimeout(uiFadeTimeout);
            if (document.activeElement === searchInput) return;

            uiFadeTimeout = setTimeout(() => {
                uiContainer.classList.add('cinematic-mode');
            }, 3000);
        }

        window.addEventListener('mousemove', startUIFadeTimer);
        window.addEventListener('touchstart', startUIFadeTimer); 
        window.addEventListener('click', startUIFadeTimer);      
        searchInput.addEventListener('blur', startUIFadeTimer);
        searchInput.addEventListener('focus', startUIFadeTimer);
        
        // ⌨️ Watch for Global Key Presses (Handles Escape and general wake routines)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                stopEnvironment(); // Kill vibe instantly on ESC key press
            } else {
                startUIFadeTimer();
            }
        }); 

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                const lowerQuery = query.toLowerCase();
                
                if (query.length > 0) {
                    // Check for manual text stop commands
                    if (lowerQuery === 'stop' || lowerQuery === 'clear' || lowerQuery === 'reset') {
                        stopEnvironment();
                    } else if (localDatabase[lowerQuery]) {
                        runEnvironment(localDatabase[lowerQuery]);
                    } else {
                        fetchDynamicVideo(query);
                    }
                }
                
                if (lowerQuery !== 'stop' && lowerQuery !== 'clear' && lowerQuery !== 'reset') {
                    searchInput.value = ''; 
                    searchInput.blur();     
                }
            }
        });
    </script>
</body>
</html>
