<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOCHUPITSI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #070a12;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .bg-video.visible {
            opacity: 1;
        }

        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .header-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 30px;
            border-radius: 15px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .search-box {
            width: 100%;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .search-box:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(10, 15, 30, 0.75);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.03);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <video id="rainVideo" class="bg-video" loop playsinline>
        <source src="rain_video1090.mp4" type="video/mp4">
    </video>

    <video id="trainVideo" class="bg-video" loop playsinline>
        <source src="356116.mp4" type="video/mp4">
    </video>

    <video id="spaceVideo" class="bg-video" loop playsinline>
        <source src="interstellar.mp4" type="video/mp4">
    </video>

    <div class="ui-container">
        <div class="header-box">FOR HOCHUPITSI</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Type 'rain' or 'train'..." autofocus>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const rainVideo = document.getElementById('rainVideo');
        const trainVideo = document.getElementById('trainVideo');
        const spaceVideo = document.getElementById('spaceVideo');

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.toLowerCase().trim();

                rainVideo.classList.remove('visible');
                rainVideo.pause();
                trainVideo.classList.remove('visible');
                trainVideo.pause();
                spaceVideo.classList.remove('visible');
                spaceVideo.pause();

                if (query === 'rain') {
                    rainVideo.classList.add('visible');
                    rainVideo.currentTime = 0; 
                    
                    rainVideo.muted = false; 
                    
                    rainVideo.play().catch(err => {
                        console.error("Audio playback blocked by browser settings:", err);
                    });
                } else if (query === 'train') {
                    trainVideo.classList.add('visible');
                    trainVideo.currentTime = 0; 

                    trainVideo.muted = false; 
                    
                    trainVideo.play().catch(err => {
                        console.error("Audio playback blocked by browser settings:", err);
                    });
                    } else if (query === 'space') {
                    spaceVideo.classList.add('visible');
                    spaceVideo.currentTime = 0; 
n
                    spaceVideo.muted = false; 
                    
                    spaceVideo.play().catch(err => {
                        console.error("Audio playback blocked by browser settings:", err);
                    });
                } else {
                    alert("Please type either 'rain' or 'train'.");
                }
            }
        });
    </script>
</body>
</html>
