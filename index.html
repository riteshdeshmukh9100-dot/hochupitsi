<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOCHUPITSI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #070a12;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation; 
        }

        /* 🎥 Reusable Double Buffer Video Channels */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s linear; 
        }

        .bg-video.visible {
            opacity: 1;
        }

        /* 🖼️ Offline Start Background Image Setup (Cat Keepers) */
        .start-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            /* Pins focal alignment to guarantee both cats remain fully visible across all aspect ratios */
            object-position: center 60%; 
            z-index: 2; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        .start-bg.visible {
            opacity: 1;
        }

        /* 🎛️ User Interface Wrapper */
        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .ui-container.cinematic-mode {
            opacity: 0;
            pointer-events: none; 
            transform: translateY(15px);
        }

        /* 🏷️ Header Style */
        .header-box {
            background: rgba(10, 15, 30, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 30px;
            border-radius: 15px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            user-select: none;
        }

        /* 🔍 Search Input Box Style */
        .search-box {
            width: 100%;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
            -webkit-appearance: none; 
        }

        .search-box:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(10, 15, 30, 0.75);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.03);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
        }

        /* 🛑 Stop Button Style */
        .stop-btn {
            background: rgba(255, 99, 99, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 99, 99, 0.25);
            padding: 10px 24px;
            border-radius: 30px;
            color: #ff8585;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateY(5px);
        }

        .stop-btn.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .stop-btn:hover {
            background: rgba(255, 99, 99, 0.25);
            border-color: rgba(255, 99, 99, 0.5);
            color: #fff;
        }

        /* 🔒 Key Setup Modal Configuration Overlay */
        .key-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .key-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .key-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .key-card h3 { color: #fff; font-size: 18px; letter-spacing: 1px; }
        .key-card p { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.6; }
        
        .key-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .key-btn {
            background: #fff;
            color: #070a12;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .key-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- Reusable Double Buffer Video Channels -->
    <video id="videoChannelA" class="bg-video" playsinline crossorigin="anonymous"></video>
    <video id="videoChannelB" class="bg-video" playsinline crossorigin="anonymous"></video>

    <!-- 🖼️ Line 124: The updated start image layout link -->
    <img id="startImage" class="start-bg visible" src="shunya_phylya.jpg" alt="Cats Backdrop">

    <!-- Main View Controls Container -->
    <div id="uiContainer" class="ui-container">
        <div class="header-box">FOR HOCHUPITSI</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Type anything you want to see..." autofocus>
        <button id="stopButton" class="stop-btn">Stop Vibe</button>
    </div>

    <!-- The Keyless Setup Screen Overlay -->
    <div id="keyModal" class="key-modal">
        <div class="key-card">
            <h3>Pexels Key Activation</h3>
            <p>To use dynamic AI searches safely, generate a free key on pexels.com/api and paste it below. It saves locally to your browser profile.</p>
            <input type="text" id="keyInput" class="key-input" placeholder="Paste your API key here...">
            <button id="saveKeyBtn" class="key-btn">Activate Environment</button>
        </div>
    </div>

    <script>
        const PEXELS_API_KEY = "Y284hGioTJ3wn6n1dHtkYKy05rryaRtxu2x0zeACAGRJJcWQi1G2CZvd"; 

        const uiContainer = document.getElementById('uiContainer');
        const searchInput = document.getElementById('searchInput');
        const stopButton = document.getElementById('stopButton');
        const startImage = document.getElementById('startImage');
        const videoA = document.getElementById('videoChannelA');
        const videoB = document.getElementById('videoChannelB');
        
        const keyModal = document.getElementById('keyModal');
        const keyInput = document.getElementById('keyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');

        const localDatabase = {
            'rain': 'rain_video1090.mp4',
            'train': '356116.mp4',
            'space': 'interstellar.mp4'
        };

        let activeChannel = videoA;
        let bufferChannel = videoB;
        
        let isVideoActive = false;
        let uiFadeTimeout;
        let crossfadeTriggered = false;
        let currentFetchController = null; 

        // --- 🔁 Perfect Endless Seamless Loop System ---
        function handleTimeUpdate(e) {
            const vid = e.target;
            if (vid !== activeChannel || !vid.duration) return;

            if (vid.currentTime > vid.duration - 0.6 && !crossfadeTriggered) {
                crossfadeTriggered = true;
                
                bufferChannel.currentTime = 0;
                bufferChannel.muted = false;
                
                bufferChannel.play().then(() => {
                    activeChannel.classList.remove('visible');
                    bufferChannel.classList.add('visible');

                    let temp = activeChannel;
                    activeChannel = bufferChannel;
                    bufferChannel = temp;

                    bufferChannel.pause();
                    crossfadeTriggered = false;
                }).catch(() => {
                    crossfadeTriggered = false;
                });
            }
        }

        videoA.addEventListener('timeupdate', handleTimeUpdate);
        videoB.addEventListener('timeupdate', handleTimeUpdate);

        // --- 🤖 Dynamic AI API Request Engine ---
        async function fetchDynamicVideo(query) {
            const savedKey = localStorage.getItem('hochupitsi_api_key');
            if (!savedKey) {
                keyModal.classList.add('active');
                return;
            }

            currentFetchController = new AbortController();
            const signal = currentFetchController.signal;

            try {
                const response = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=landscape&per_page=3`, {
                    headers: { 'Authorization': savedKey },
                    signal: signal 
                });

                if (response.status === 401) {
                    alert("Authentication Failure: Your saved Pexels key is invalid or expired.");
                    localStorage.removeItem('hochupitsi_api_key');
                    keyModal.classList.add('active');
                    return;
                }

                const data = await response.json();

                if (!data.videos || data.videos.length === 0) {
                    alert(`Vibe check failed: Could not find any videos matching "${query}".`);
                    return;
                }

                const videoData = data.videos[0];
                const matchingFile = videoData.video_files.find(f => f.file_type === 'video/mp4' && f.quality === 'hd') || videoData.video_files[0];

                if (matchingFile && matchingFile.link) {
                    runEnvironment(matchingFile.link);
                }

            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error(error);
            }
        }

        // Core dynamic stream loading router
        function runEnvironment(videoStreamUrl) {
            crossfadeTriggered = false;
            videoA.pause(); videoB.pause();
            videoA.classList.remove('visible'); videoB.classList.remove('visible');

            // Smoothly slide out the cat placeholder image when video initializes
            startImage.classList.remove('visible');

            videoA.src = videoStreamUrl; videoB.src = videoStreamUrl;
            videoA.load(); videoB.load();

            activeChannel = videoA; bufferChannel = videoB;
            activeChannel.classList.add('visible'); activeChannel.muted = false;

            activeChannel.play().then(() => {
                isVideoActive = true;
                stopButton.classList.add('active');
                startUIFadeTimer();
            }).catch(() => {
                activeChannel.muted = true;
                activeChannel.play().then(() => {
                    isVideoActive = true;
                    stopButton.classList.add('active');
                    startUIFadeTimer();
                });
            });
        }

        // 🛑 MASTER SHUTDOWN CONTROLLER
        function stopEnvironment() {
            isVideoActive = false;
            clearTimeout(uiFadeTimeout);
            
            videoA.pause();
            videoB.pause();
            videoA.classList.remove('visible');
            videoB.classList.remove('visible');
            videoA.src = "";
            videoB.src = "";
            
            // Instantly fade the cat backdrop back in when user stops a running scene
            startImage.classList.add('visible');
            
            uiContainer.classList.remove('cinematic-mode');
            stopButton.classList.remove('active'); 
            searchInput.value = '';
            searchInput.focus(); 
        }

        stopButton.addEventListener('click', (e) => {
            e.stopPropagation(); 
            stopEnvironment();
        });

        // Interface visibility manager
        function startUIFadeTimer() {
            if (!isVideoActive) return; 
            uiContainer.classList.remove('cinematic-mode');
            clearTimeout(uiFadeTimeout);
            if (document.activeElement === searchInput) return;

            uiFadeTimeout = setTimeout(() => {
                uiContainer.classList.add('cinematic-mode');
            }, 3000);
        }

        window.addEventListener('mousemove', startUIFadeTimer);
        window.addEventListener('touchstart', startUIFadeTimer); 
        window.addEventListener('click', startUIFadeTimer);      
        searchInput.addEventListener('blur', startUIFadeTimer);
        searchInput.addEventListener('focus', startUIFadeTimer);
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                stopEnvironment(); 
            } else {
                startUIFadeTimer();
            }
        }); 

        saveKeyBtn.addEventListener('click', () => {
            const inputVal = keyInput.value.trim();
            if (inputVal.length > 5) {
                localStorage.setItem('hochupitsi_api_key', inputVal);
                keyModal.classList.remove('active');
                alert("Environment Authenticated! Try your search again.");
            } else {
                alert("Please enter a valid Pexels API key text string.");
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                const lowerQuery = query.toLowerCase();
                
                if (query.length > 0) {
                    if (currentFetchController) currentFetchController.abort();

                    if (lowerQuery === 'stop' || lowerQuery === 'clear' || lowerQuery === 'reset') {
                        stopEnvironment();
                    } else if (localDatabase[lowerQuery]) {
                        runEnvironment(localDatabase[lowerQuery]);
                    } else {
                        if (!localStorage.getItem('hochupitsi_api_key')) {
                            keyModal.classList.add('active');
                        } else {
                            fetchDynamicVideo(query);
                        }
                    }
                }
                
                if (lowerQuery !== 'stop' && lowerQuery !== 'clear' && lowerQuery !== 'reset') {
                    searchInput.value = ''; 
                    searchInput.blur();     
                }
            }
        });
    </script>
</body>
</html>
